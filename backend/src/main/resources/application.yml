server:
  port: ${PORT:8080}

spring:
  application:
    name: practice-management-system
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DATABASE_URL:${JDBC_DATABASE_URL:${MYSQL_URL:jdbc:mysql://localhost:3306/practice_management?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&connectTimeout=10000&socketTimeout=30000}}}
    username: ${MYSQLUSER:${MYSQL_USER:${DB_USER:root}}}
    password: ${MYSQLPASSWORD:${MYSQL_PASSWORD:${DB_PASSWORD:123520}}}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 30000
      connection-timeout: 30000
      max-lifetime: 1800000
  data:
    redis:
      host: ${REDISHOST:${REDIS_HOST:localhost}}
      port: ${REDISPORT:${REDIS_PORT:6379}}
      password: ${REDISPASSWORD:${REDIS_PASSWORD:}}
      database: 0
      timeout: 3000ms

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath:mapper/*.xml

jwt:
  secret: practice-management-system-secret-key-2024
  expiration: 86400000